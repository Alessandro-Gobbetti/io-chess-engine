name: Build and Deploy Docs

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz wget
          wget https://www.doxygen.nl/files/doxygen-1.11.0.linux.bin.tar.gz
          tar -xzvf doxygen-1.11.0.linux.bin.tar.gz
          sudo mv doxygen-1.11.0/bin/doxygen /usr/local/bin/

      - name: Build documentation
        run: doxygen Doxyfile

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
